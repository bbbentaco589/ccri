<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCRI - Coin Crypto Risk Index</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-logo" id="homeLinkTop">CCRI</div>
            <div class="nav-menu" id="navMenu">
                <div class="nav-links">
                    <a href="https://linktr.ee/ccgguild" target="_blank" class="nav-item">
                        <span class="main-label">CCGG</span>
                        <span class="sub-label">Linktree ↗</span>
                    </a>
                    <a href="https://opensea.io/collection/ccgg-pfp-nft" target="_blank" class="nav-item">
                        <span class="main-label">Mink NFT</span>
                        <span class="sub-label">MarketPlace ↗</span>
                    </a>
                    <a href="https://upbit.com" target="_blank" class="nav-item">
                        <span class="main-label">Coin Exchange</span>
                        <span class="sub-label">Upbit ↗</span>
                    </a>
                    <a href="#event" class="nav-item">
                        <span class="main-label">Event</span>
                        <span class="sub-label">Apply ↗</span>
                    </a>
                </div>
                <div id="authContainer" class="auth-container">
                    <button id="loginBtn" class="auth-btn">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="G">
                        <span>LOGIN</span>
                    </button>
                </div>
                <button id="themeToggle" class="theme-toggle">
                    <span class="icon"></span>
                    <span class="text">다크 모드</span>
                </button>
            </div>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
    </nav>

    <header>
        <h1 id="homeLink" class="main-title">CCRI</h1>
        <p>Crypto Consumer Rating Index</p>
    </header>

    <main>
        <!-- List View -->
        <div id="list-view" class="view">
            <div class="container">
                <div class="search-section">
                    <div class="search-wrapper">
                        <input type="text" id="searchInput" placeholder="코인 이름 또는 심볼(BTC)을 검색하세요...">
                        <span class="search-icon">🔍</span>
                    </div>
                </div>
                <div id="coin-list" class="coin-list">
                    <!-- Coin components will be inserted here -->
                </div>
            </div>
        </div>

        <!-- Detail View -->
        <div id="detail-view" class="view hidden">
            <div class="container">
                <button id="backButton" class="back-btn">
                    <span class="arrow">←</span> 리스트로 돌아가기
                </button>
                <div id="detail-content">
                    <!-- Detail content will be inserted here -->
                </div>
            </div>
        </div>

        <!-- Event View -->
        <div id="event-view" class="view hidden">
            <div class="container">
                <button class="back-btn" onclick="window.location.hash = ''">
                    <span class="arrow">←</span> 메인으로 돌아가기
                </button>
                <div class="event-form-container">
                    <h2>Event 신청 및 문의</h2>
                    <p>진행 중인 이벤트에 참여하거나 궁금한 점을 남겨주세요.</p>
                    <form action="https://formspree.io/f/xgoroeag" method="POST" class="event-form">
                        <div class="form-group">
                            <label>성함/닉네임</label>
                            <input type="text" name="name" required placeholder="이름을 입력하세요">
                        </div>
                        <div class="form-group">
                            <label>이메일 주소</label>
                            <input type="email" name="_replyto" required placeholder="답변 받을 이메일을 입력하세요">
                        </div>
                        <div class="form-group">
                            <label>신청/문의 내용</label>
                            <textarea name="message" required placeholder="내용을 자유롭게 입력해 주세요"></textarea>
                        </div>
                        <button type="submit" class="auth-btn" style="width:100%; height:55px; margin-top:1rem;">신청하기</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CCRI & CCGG. All rights reserved.</p>
    </footer>
    <script src="main.js" type="module"></script>
</body>
</html>
