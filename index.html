<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCRI - Coin Crypto Risk Index</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <button id="themeToggle" class="theme-toggle">
            <span class="icon"></span>
            <span class="text">Dark Mode</span>
        </button>
        <h1 id="homeLink" style="cursor: pointer;">CCRI</h1>
        <p>Crypto Consumer Rating Index</p>
    </header>

    <main>
        <div id="list-view" class="view">
            <div class="container">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Search for a coin...">
                </div>
                <div id="coin-list" class="coin-list">
                    <!-- Coin components will be inserted here -->
                </div>
            </div>
        </div>

        <div id="detail-view" class="view hidden">
            <div class="container">
                <button id="backButton" class="back-btn">← Back to List</button>
                <div id="detail-content">
                    <!-- Detail content will be inserted here -->
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 CCRI. All rights reserved.</p>
    </footer>
    <script src="main.js" type="module"></script>
</body>
</html>
