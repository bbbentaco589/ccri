<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCRI - Coin Crypto Risk Index</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-logo" id="homeLinkTop">CCRI</div>
            <div class="nav-menu" id="navMenu">
                <div class="nav-links">
                    <a href="https://linktr.ee/ccgguild" target="_blank" class="nav-item">
                        <span class="main-label">CCGG</span>
                        <span class="sub-label">Linktree ↗</span>
                    </a>
                    <a href="https://opensea.io/collection/ccgg-pfp-nft" target="_blank" class="nav-item">
                        <span class="main-label">Mink NFT</span>
                        <span class="sub-label">MarketPlace ↗</span>
                    </a>
                </div>
                <div id="authContainer" class="auth-container">
                    <button id="loginBtn" class="auth-btn">LOGIN</button>
                </div>
                <button id="themeToggle" class="theme-toggle">
                    <span class="icon"></span>
                    <span class="text">다크 모드</span>
                </button>
            </div>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
    </nav>

    <header>
        <h1 id="homeLink" class="main-title">CCRI</h1>
        <p>Crypto Consumer Rating Index</p>
    </header>

    <main>
        <div id="list-view" class="view">
            <div class="container">
                <div class="search-section">
                    <div class="search-wrapper">
                        <input type="text" id="searchInput" placeholder="코인을 검색하세요...">
                        <span class="search-icon">🔍</span>
                    </div>
                </div>
                <div id="coin-list" class="coin-list">
                    <!-- Coin components will be inserted here -->
                </div>
            </div>
        </div>

        <div id="detail-view" class="view hidden">
            <div class="container">
                <button id="backButton" class="back-btn">
                    <span class="arrow">←</span> 리스트로 돌아가기
                </button>
                <div id="detail-content">
                    <!-- Detail content will be inserted here -->
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CCRI & CCGG. All rights reserved.</p>
    </footer>
    <script src="main.js" type="module"></script>
</body>
</html>
